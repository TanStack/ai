cleanupUnusedCatalogs: true
linkWorkspacePackages: true
preferWorkspacePackages: true
blockExoticSubdeps: true
trustPolicy: 'no-downgrade'

# pnpm v11 dropped support for these fields in package.json — they must live
# here. See https://github.com/pnpm/pnpm/releases/tag/v11.0.0.
overrides:
  abbrev: ^3.0.0
  # Force every workspace library under packages/ to resolve to its local
  # workspace copy, even when a transitive/example dependency references a
  # published version. When you add a new package under packages/, add it here.
  '@tanstack/ai': workspace:*
  '@tanstack/ai-anthropic': workspace:*
  '@tanstack/ai-cli': workspace:*
  '@tanstack/ai-client': workspace:*
  '@tanstack/ai-code-mode': workspace:*
  '@tanstack/ai-code-mode-models-eval': workspace:*
  '@tanstack/ai-code-mode-skills': workspace:*
  '@tanstack/ai-devtools-core': workspace:*
  '@tanstack/ai-elevenlabs': workspace:*
  '@tanstack/ai-event-client': workspace:*
  '@tanstack/ai-fal': workspace:*
  '@tanstack/ai-gemini': workspace:*
  '@tanstack/ai-grok': workspace:*
  '@tanstack/ai-groq': workspace:*
  '@tanstack/ai-isolate-cloudflare': workspace:*
  '@tanstack/ai-isolate-node': workspace:*
  '@tanstack/ai-isolate-quickjs': workspace:*
  '@tanstack/ai-mcp': workspace:*
  '@tanstack/ai-ollama': workspace:*
  '@tanstack/ai-openai': workspace:*
  '@tanstack/ai-openrouter': workspace:*
  '@tanstack/ai-preact': workspace:*
  '@tanstack/ai-react': workspace:*
  '@tanstack/ai-react-ui': workspace:*
  '@tanstack/ai-solid': workspace:*
  '@tanstack/ai-solid-ui': workspace:*
  '@tanstack/ai-svelte': workspace:*
  '@tanstack/ai-utils': workspace:*
  '@tanstack/ai-vue': workspace:*
  '@tanstack/ai-vue-ui': workspace:*
  '@tanstack/openai-base': workspace:*
  '@tanstack/preact-ai-devtools': workspace:*
  '@tanstack/react-ai-devtools': workspace:*
  '@tanstack/solid-ai-devtools': workspace:*

patchedDependencies:
  '@changesets/assemble-release-plan@6.0.9': patches/@changesets__assemble-release-plan@6.0.9.patch

packages:
  - 'packages/*'
  - 'packages/ai-code-mode/models-eval'
  - 'examples/*'
  - 'testing/*'
  - 'codemods'

allowBuilds:
  # Vite + every transitive bundler-step needs the platform-specific binary.
  esbuild: true
  # @google/genai (used by @tanstack/ai-gemini in CI) loads files generated by
  # protobufjs's postinstall.
  protobufjs: true
  # Expo/Metro reaches this through msgpackr and can use the native extractor.
  msgpackr-extract: true
  # Everything below is reachable only from dev scripts (wrangler dev,
  # examples/ts-code-mode-web), is a perf optimisation with a working JS
  # fallback, or has a no-op postinstall — none are required for `pnpm test:ci`
  # to pass. Flip to true case-by-case if a future change relies on the script.
  '@openrouter/sdk': false
  '@parcel/watcher': false
  isolated-vm: false
  nx: false
  puppeteer: false
  sharp: false
  unrs-resolver: false
  workerd: false
